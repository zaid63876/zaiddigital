<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SHADOW OS" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>SHADOW OS — ZAID</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000; --panel:#07060f; --panel2:#0c0a1a;
    --primary:#6B21FF; --primary2:#8b5cff; --cyan:#22d3ee;
    --gold:#FFD700; --hp:#FF3B30; --xp:#22d3ee; --ok:#00FF88;
    --txt:#e9e7ff; --muted:#8a86b8; --line:rgba(139,92,255,.22);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
    font-family:'Rajdhani',sans-serif; overscroll-behavior:none; -webkit-user-select:none; user-select:none;}
  body{background:
    radial-gradient(1200px 600px at 50% -10%, rgba(107,33,255,.18), transparent 60%),
    radial-gradient(800px 500px at 100% 100%, rgba(34,211,238,.07), transparent 60%), #000;
    min-height:100vh;}
  h1,h2,h3,.font-o{font-family:'Orbitron',sans-serif; letter-spacing:1px;}
  #root{max-width:560px; margin:0 auto; padding:14px 14px 100px; min-height:100vh;}
  .glow{text-shadow:0 0 12px currentColor;}
  ::-webkit-scrollbar{width:0;height:0;}
  input,textarea,button{font-family:'Rajdhani';}

  .card{position:relative; background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid transparent; border-radius:16px; padding:14px;
    box-shadow:0 10px 40px rgba(107,33,255,.06); margin-bottom:14px;
    background-clip:padding-box;}
  /* animated lila/gold gradient border */
  .card::before{content:""; position:absolute; inset:0; border-radius:16px; padding:1px; pointer-events:none;
    background:linear-gradient(120deg,rgba(139,92,255,.55),rgba(255,215,0,.35),rgba(34,211,238,.4),rgba(139,92,255,.55));
    background-size:300% 300%; animation:borderflow 8s linear infinite;
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude; opacity:.5;}
  @keyframes borderflow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
  .row{display:flex; align-items:center; gap:10px;}
  .between{justify-content:space-between;}
  .muted{color:var(--muted);}
  .pill{font-size:11px; padding:3px 9px; border-radius:999px; border:1px solid var(--line);
    color:var(--primary2); background:rgba(107,33,255,.08); font-weight:600; letter-spacing:.5px; white-space:nowrap;}

  .bar{height:14px; border-radius:10px; background:#13111f; overflow:hidden;
    border:1px solid rgba(255,255,255,.06); position:relative;}
  .bar > i{display:block; height:100%; border-radius:10px; transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .bar.hp > i{background:linear-gradient(90deg,#FF3B30,#ff7a72); box-shadow:0 0 14px #FF3B30aa;}
  .bar.xp > i{background:linear-gradient(90deg,#22d3ee,#6B21FF); box-shadow:0 0 14px #22d3eeaa;}
  .bar.gold > i{background:linear-gradient(90deg,#FFD700,#ff9d00); box-shadow:0 0 14px #FFD70088;}
  .bar .lbl{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; letter-spacing:.5px; text-shadow:0 1px 2px #000;}

  /* stat segmented bars */
  .statbar{display:flex; align-items:center; gap:8px; margin-bottom:9px;}
  .statbar .k{width:40px; font-family:'Orbitron'; font-size:12px;}
  .seg{flex:1; display:flex; gap:3px;}
  .seg b{flex:1; height:11px; border-radius:3px; background:#1a1730;}
  .statbar .v{width:30px; text-align:right; font-family:'Orbitron'; font-size:13px;}

  .quest{display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:12px;
    border:1px solid rgba(255,255,255,.06); background:#0a0816; margin-bottom:9px; cursor:pointer;
    transition:transform .12s, border-color .2s, background .2s;}
  .quest:active{transform:scale(.985);}
  .quest.done{background:linear-gradient(90deg,rgba(0,255,136,.10),rgba(107,33,255,.08));
    border-color:rgba(0,255,136,.4);}
  .qbox{width:24px; height:24px; border-radius:7px; border:2px solid var(--primary2);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; font-size:14px;
    color:#000; transition:.2s;}
  .quest.done .qbox{background:var(--ok); border-color:var(--ok); box-shadow:0 0 12px var(--ok);}
  .qtitle{font-weight:600; font-size:15px; line-height:1.1;}
  .qrew{font-size:11px; color:var(--muted); margin-top:2px; letter-spacing:.3px;}
  .quest.done .qtitle{color:var(--muted);}

  .btn{font-weight:700; letter-spacing:.5px; border:none; cursor:pointer; border-radius:12px;
    padding:12px 14px; color:#fff; font-size:14px;
    background:linear-gradient(90deg,var(--primary),#3b82f6); box-shadow:0 6px 20px rgba(107,33,255,.35);}
  .btn:active{transform:translateY(1px);}
  .btn{transition:transform .15s, box-shadow .2s;}
  @media(hover:hover){.btn:hover{transform:scale(1.02); box-shadow:0 0 20px var(--primary2);}}
  .btn.gold{background:linear-gradient(90deg,#FFD700,#ff9d00); color:#1a1300;}
  .btn.ghost{background:#0c0a1a; border:1px solid var(--line); color:var(--txt); box-shadow:none;}
  .btn.ok{background:linear-gradient(90deg,#00FF88,#00b894); color:#04130b;}
  .btn.danger{background:linear-gradient(90deg,#FF3B30,#ff7a72);}
  input,textarea,select{background:#0a0816; border:1px solid var(--line); color:#fff;
    border-radius:10px; padding:10px; font-size:15px; width:100%;}

  .tabs{position:fixed; bottom:0; left:0; right:0; z-index:40; background:rgba(5,4,12,.94);
    backdrop-filter:blur(14px); border-top:1px solid var(--line); display:flex; padding:8px 4px calc(8px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto;}
  .tab{flex:1; text-align:center; padding:6px 1px; color:var(--muted); font-size:9px; font-weight:600;
    letter-spacing:.3px; border-radius:10px; cursor:pointer;}
  .tab .ic{font-size:19px; display:block; line-height:1.4;}
  .tab.active{color:#fff;}
  .tab.active .ic{filter:drop-shadow(0 0 8px var(--primary2));}

  .rankbadge{font-family:'Orbitron'; font-weight:900; font-size:30px; width:62px; height:62px;
    display:flex; align-items:center; justify-content:center; border-radius:16px; flex:0 0 auto;
    border:2px solid; overflow:hidden;}
  .title-chip{display:inline-block; font-size:11px; padding:5px 10px; margin:4px 4px 0 0; border-radius:8px;
    border:1px solid var(--line); background:rgba(107,33,255,.07); font-weight:600;}
  .title-chip.locked{opacity:.4; filter:grayscale(.6);}
  .title-chip.unlocked{border-color:var(--gold); color:var(--gold); box-shadow:0 0 10px rgba(255,215,0,.15);}
  .section-title{font-family:'Orbitron'; font-size:12px; letter-spacing:2px; color:var(--primary2);
    margin:12px 0 10px; text-transform:uppercase;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}

  /* Overlays */
  .overlay{position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 45%, rgba(107,33,255,.28), rgba(0,0,0,.94)); backdrop-filter:blur(4px);
    animation:fade .4s ease; text-align:center; padding:24px;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .big-txt{font-family:'Orbitron'; font-weight:900; font-size:12vw; color:#fff;
    text-shadow:0 0 30px var(--primary2),0 0 60px var(--primary); animation:pop .6s cubic-bezier(.2,1.4,.4,1);}
  @keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  .sub{font-size:18px; color:var(--cyan); letter-spacing:3px; margin-top:6px;}
  canvas#fx{position:fixed; inset:0; z-index:99; pointer-events:none;}
  canvas#fx3d{position:fixed; inset:0; z-index:98; pointer-events:none;}
  canvas#ambient{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.55;}
  #root{position:relative; z-index:1;}

  /* 3D card-flip page transition */
  .screen{transform-origin:center; backface-visibility:hidden;
    animation:flipIn .45s cubic-bezier(.2,.85,.25,1);}
  @keyframes flipIn{
    0%{transform:perspective(1400px) rotateY(-82deg) scale(.94); opacity:0; filter:blur(2px);}
    100%{transform:perspective(1400px) rotateY(0) scale(1); opacity:1; filter:blur(0);}}

  /* micro: streak fire */
  .fire{display:inline-block; animation:fire 1.1s ease-in-out infinite;}
  @keyframes fire{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.25) rotate(3deg); filter:drop-shadow(0 0 8px #ff9d00)}}

  /* micro: HP red full-screen flash */
  .redflash{position:fixed; inset:0; z-index:95; pointer-events:none; background:radial-gradient(circle,transparent 40%,rgba(255,59,48,.45));
    animation:redflash .7s ease-out forwards;}
  @keyframes redflash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

  /* cinematic rank up */
  .cine{position:fixed; inset:0; z-index:130; background:#000; display:flex; align-items:center; justify-content:center; text-align:center; overflow:hidden;}
  .cine .flash{position:absolute; width:10px; height:10px; border-radius:50%; background:#fff;
    box-shadow:0 0 120px 80px #fff,0 0 240px 160px #8b5cff; animation:cflash 1.2s ease-out forwards;}
  @keyframes cflash{0%{transform:scale(0); opacity:1}60%{opacity:1}100%{transform:scale(60); opacity:0}}
  .cine .ctext{position:relative; z-index:2; opacity:0; animation:ctext .8s ease-out .5s forwards;}
  @keyframes ctext{from{opacity:0; transform:translateY(20px) scale(.8)}to{opacity:1; transform:translateY(0) scale(1)}}
  .cine .rankup{font-family:'Orbitron'; font-weight:900; font-size:11vw; letter-spacing:.3em; color:#fff; text-shadow:0 0 30px #8b5cff;}
  .cine .now{font-family:'Orbitron'; font-weight:900; font-size:8vw; margin-top:10px; text-shadow:0 0 30px currentColor;}
  .cine .tag{font-size:18px; letter-spacing:4px; color:#22d3ee; margin-top:8px;}

  /* 3D loot chest lid */
  .chest3d{width:120px; height:90px; margin:10px auto; position:relative; transform-style:preserve-3d;}
  .chest3d .box{position:absolute; bottom:0; left:0; right:0; height:55px; border-radius:8px;
    background:linear-gradient(180deg,#3a2a0a,#1a1300); border:2px solid var(--gold); box-shadow:0 0 24px rgba(255,215,0,.4);}
  .chest3d .lid{position:absolute; top:0; left:0; right:0; height:42px; border-radius:8px 8px 4px 4px;
    background:linear-gradient(180deg,#FFD700,#b8860b); transform-origin:bottom; transform:rotateX(0);
    animation:lidopen 1s cubic-bezier(.3,1.5,.5,1) .2s forwards; box-shadow:0 0 24px rgba(255,215,0,.5);}
  @keyframes lidopen{from{transform:perspective(300px) rotateX(0)}to{transform:perspective(300px) rotateX(-110deg)}}
  .canvas-orb{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:0;}
  .typing{font-family:'Orbitron'; letter-spacing:.35em;}
  .typing b{opacity:0; animation:rev .05s forwards;}
  @keyframes rev{to{opacity:1}}
  .penalty{position:fixed; inset:0; z-index:90; pointer-events:none;
    box-shadow:inset 0 0 120px 30px rgba(255,59,48,.55); animation:pulse 1.1s infinite;}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .coin{position:fixed; z-index:101; font-size:26px; pointer-events:none; animation:coinUp 1.1s ease forwards;}
  @keyframes coinUp{0%{transform:translateY(0) scale(.6);opacity:0}20%{opacity:1}100%{transform:translateY(-160px) scale(1.2);opacity:0}}
  .floatxp{position:fixed; z-index:101; font-family:'Orbitron'; font-weight:700; color:var(--cyan);
    pointer-events:none; text-shadow:0 0 10px var(--cyan); animation:fxp 1.1s ease forwards; font-size:20px;}
  @keyframes fxp{0%{transform:translateY(0);opacity:0}20%{opacity:1}100%{transform:translateY(-90px);opacity:0}}

  .modal{position:fixed; inset:0; z-index:80; background:rgba(0,0,0,.72); backdrop-filter:blur(6px);
    display:flex; align-items:flex-end; justify-content:center; animation:fade .3s;}
  .sheet{width:100%; max-width:560px; background:linear-gradient(180deg,#0c0a1a,#050409);
    border-top-left-radius:22px; border-top-right-radius:22px; border:1px solid var(--line);
    padding:18px 16px calc(18px + env(safe-area-inset-bottom)); animation:slideUp .35s cubic-bezier(.2,.9,.2,1);
    max-height:90vh; overflow-y:auto;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .chest{font-size:80px; animation:shake .6s; filter:drop-shadow(0 0 30px var(--gold));}
  @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}

  /* heatmap */
  .heat{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .heat div{aspect-ratio:1; border-radius:4px; background:#15122a; display:flex; align-items:center; justify-content:center; font-size:9px;}

  /* mood faces */
  .moodrow{display:flex; gap:8px; justify-content:space-between;}
  .moodbtn{flex:1; aspect-ratio:1; border-radius:14px; border:1px solid var(--line); background:#0a0816;
    font-size:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.15s;}
  .moodbtn:active{transform:scale(.9);}

  .gate{position:fixed; inset:0; z-index:120; background:#000;
    background:radial-gradient(circle at 50% 40%, rgba(107,33,255,.25), #000 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;}
  .seg-tab{display:flex; gap:6px; margin:14px 0;}
  .seg-tab button{flex:1; padding:9px; border-radius:10px; border:1px solid var(--line); background:#0a0816; color:var(--muted); font-weight:700; font-size:12px;}
  .seg-tab button.on{background:var(--primary); color:#fff; border-color:var(--primary);}
  .shaketip{font-size:60px; animation:wob .5s infinite;}
  @keyframes wob{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
</style>
</head>

<div id="root"></div>
<canvas id="fx"></canvas>

<script crossorigin src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useMemo} = React;
const THREE = window.THREE;

/* ============ THREE.JS 3D ============ */
function mountAmbient(){
  if(!THREE) return;
  const canvas=document.getElementById('ambient');
  let r; try{ r=new THREE.WebGLRenderer({canvas,alpha:true,antialias:false}); }catch(e){ return; }
  r.setSize(innerWidth,innerHeight); r.setPixelRatio(Math.min(devicePixelRatio,1.5));
  const sc=new THREE.Scene(), cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,100); cam.position.z=6;
  const N=170, geo=new THREE.BufferGeometry(), pos=new Float32Array(N*3);
  for(let i=0;i<N*3;i++) pos[i]=(Math.random()-.5)*15;
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:0x6B21FF,size:.055,transparent:true,opacity:.6}));
  sc.add(pts);
  const pts2=new THREE.Points(geo.clone(),new THREE.PointsMaterial({color:0x22d3ee,size:.03,transparent:true,opacity:.3}));
  pts2.scale.setScalar(.7); sc.add(pts2);
  (function loop(){ pts.rotation.y+=0.0008; pts.rotation.x+=0.0003; pts2.rotation.y-=0.0006; r.render(sc,cam); requestAnimationFrame(loop); })();
  addEventListener('resize',()=>{ r.setSize(innerWidth,innerHeight); cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); });
}
function mountOrb(container,color=0x8b5cff){
  if(!THREE||!container) return ()=>{};
  const W=container.clientWidth||130,H=container.clientHeight||130;
  let r; try{ r=new THREE.WebGLRenderer({alpha:true,antialias:true}); }catch(e){ return ()=>{}; }
  r.setSize(W,H); r.setPixelRatio(Math.min(devicePixelRatio,2)); container.appendChild(r.domElement);
  const sc=new THREE.Scene(), cam=new THREE.PerspectiveCamera(50,W/H,.1,100); cam.position.z=3;
  const orb=new THREE.Mesh(new THREE.IcosahedronGeometry(1,1),new THREE.MeshBasicMaterial({color,wireframe:true}));
  const glow=new THREE.Mesh(new THREE.IcosahedronGeometry(1.22,1),new THREE.MeshBasicMaterial({color:0x6B21FF,wireframe:true,transparent:true,opacity:.22}));
  sc.add(orb); sc.add(glow);
  let raf;(function loop(){ orb.rotation.y+=0.006; orb.rotation.x+=0.0028; glow.rotation.y-=0.004; r.render(sc,cam); raf=requestAnimationFrame(loop); })();
  return ()=>{ cancelAnimationFrame(raf); try{r.dispose();}catch(e){} if(r.domElement.parentNode) r.domElement.parentNode.removeChild(r.domElement); };
}
function mountTree(container){
  if(!THREE||!container) return {setProgress(){},dispose(){}};
  const W=container.clientWidth||180,H=200;
  let r; try{ r=new THREE.WebGLRenderer({alpha:true,antialias:true}); }catch(e){ return {setProgress(){},dispose(){}}; }
  r.setSize(W,H); r.setPixelRatio(Math.min(devicePixelRatio,2)); container.appendChild(r.domElement);
  const sc=new THREE.Scene(), cam=new THREE.PerspectiveCamera(45,W/H,.1,100); cam.position.set(0,1.4,4.4); cam.lookAt(0,1,0);
  sc.add(new THREE.AmbientLight(0xffffff,.85));
  const d=new THREE.DirectionalLight(0x8b5cff,1.6); d.position.set(2,4,3); sc.add(d);
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.08,.13,1,8),new THREE.MeshStandardMaterial({color:0x4a3570}));
  const crown=new THREE.Mesh(new THREE.IcosahedronGeometry(.62,1),new THREE.MeshStandardMaterial({color:0x6B21FF,emissive:0x2a0d66,flatShading:true}));
  const halo=new THREE.Mesh(new THREE.IcosahedronGeometry(.75,1),new THREE.MeshBasicMaterial({color:0x22d3ee,wireframe:true,transparent:true,opacity:.25}));
  sc.add(trunk); sc.add(crown); sc.add(halo);
  let prog=0,target=0,raf;
  (function loop(){ prog+=(target-prog)*0.08; const h=Math.max(.001,0.3+prog*1.5); trunk.scale.y=h; trunk.position.y=h/2;
    const cs=0.04+prog*1; crown.scale.setScalar(cs); crown.position.y=h+cs*0.45; crown.rotation.y+=0.012;
    halo.scale.setScalar(cs*1.2); halo.position.y=crown.position.y; halo.rotation.y-=0.01; halo.rotation.x+=0.006;
    r.render(sc,cam); raf=requestAnimationFrame(loop); })();
  return { setProgress(p){target=Math.max(0,Math.min(1,p));}, dispose(){ cancelAnimationFrame(raf); try{r.dispose();}catch(e){} if(r.domElement.parentNode) r.domElement.parentNode.removeChild(r.domElement); } };
}
function mountPortal(container){
  if(!THREE||!container) return {dispose(){}};
  const W=container.clientWidth||300,H=230;
  let r; try{ r=new THREE.WebGLRenderer({alpha:true,antialias:true}); }catch(e){ return {dispose(){}}; }
  r.setSize(W,H); r.setPixelRatio(Math.min(devicePixelRatio,2)); container.appendChild(r.domElement);
  const sc=new THREE.Scene(), cam=new THREE.PerspectiveCamera(55,W/H,.1,100); cam.position.z=4;
  sc.add(new THREE.AmbientLight(0xffffff,.5));
  const pl=new THREE.PointLight(0x8b5cff,3,30); pl.position.set(0,0,3); sc.add(pl);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(1.15,.13,18,90),new THREE.MeshStandardMaterial({color:0x8b5cff,emissive:0x6B21FF,emissiveIntensity:1.3,metalness:.7,roughness:.2}));
  const ring2=new THREE.Mesh(new THREE.TorusGeometry(1.4,.03,12,90),new THREE.MeshBasicMaterial({color:0x22d3ee,transparent:true,opacity:.5}));
  const inner=new THREE.Mesh(new THREE.CircleGeometry(1.02,48),new THREE.MeshBasicMaterial({color:0x140a30,transparent:true,opacity:.8})); inner.position.z=-.12;
  sc.add(ring); sc.add(ring2); sc.add(inner);

  (function loop(){ scale+=(1-scale)*0.045; [ring,ring2,inner].forEach(m=>m.scale.setScalar(Math.max(scale,.001)));

  return { dispose(){ cancelAnimationFrame(raf); try{r.dispose();}catch(e){} if(r.domElement.parentNode) r.domElement.parentNode.removeChild(r.domElement); } };
}
let _b3;
function getBurst(){
  if(_b3) return _b3; if(!THREE) return null;
  const canvas=document.getElementById('fx3d');
  let r; try{ r=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true}); }catch(e){ return null; }
  r.setSize(innerWidth,innerHeight); r.setPixelRatio(Math.min(devicePixelRatio,2));
  const sc=new THREE.Scene(), cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,100); cam.position.z=10;
  sc.add(new THREE.AmbientLight(0xffffff,1));
  const d=new THREE.DirectionalLight(0xffffff,1.4); d.position.set(2,4,6); sc.add(d);
  _b3={r,sc,cam,active:false,items:[]};
  addEventListener('resize',()=>{ r.setSize(innerWidth,innerHeight); cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); });
  return _b3;
}
function burst3D(color=0x8b5cff,coins=false){
  const b=getBurst(); if(!b){ particleBurst(); return; }
  b.items.forEach(o=>b.sc.remove(o.m)); b.items=[];
  const N=coins?24:130;
  for(let i=0;i<N;i++){
    let m;
    if(coins){ m=new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,.06,20),new THREE.MeshStandardMaterial({color:0xFFD700,metalness:1,roughness:.3,emissive:0x4a3600})); m.rotation.x=Math.PI/2; m.position.set((Math.random()-.5)*8,7+Math.random()*4,(Math.random()-.5)*2); }
    else { m=new THREE.Mesh(new THREE.SphereGeometry(.08+Math.random()*.13,8,8),new THREE.MeshBasicMaterial({color:Math.random()>.5?color:0x22d3ee,transparent:true})); m.position.set(0,0,0); }
    const a=Math.random()*6.28, sp=2+Math.random()*4.5;
    b.items.push({m, vx:coins?(Math.random()-.5)*1.5:Math.cos(a)*sp, vy:coins?-(2+Math.random()*2):Math.sin(a)*sp+1, vz:coins?(Math.random()-.5):(1+Math.random()*3), rot:(Math.random()-.5)*.5, life:1, coins});
    b.sc.add(m);
  }
  if(!b.active){ b.active=true; let t=0;
    (function loop(){ t++;
      b.items.forEach(o=>{ o.m.position.x+=o.vx*0.06; o.m.position.y+=o.vy*0.06; o.m.position.z+=o.vz*0.06;
        if(o.coins){ o.vy-=0.05; o.m.rotation.z+=o.rot; o.m.rotation.y+=o.rot; } else { o.vz+=0.05; o.m.scale.multiplyScalar(1.022); }
        o.life-=0.011; o.m.material.transparent=true; o.m.material.opacity=Math.max(o.life,0); });
      b.r.render(b.sc,b.cam);
      if(t<115) requestAnimationFrame(loop); else { b.active=false; b.items.forEach(o=>b.sc.remove(o.m)); b.items=[]; b.r.clear(); }
    })();
  }
}

/* ============ FX ============ */
function particleBurst(color="#6B21FF"){
  const cv=document.getElementById("fx"),ctx=cv.getContext("2d");
  cv.width=innerWidth;cv.height=innerHeight;
  const cx=innerWidth/2,cy=innerHeight/2.4,N=130,ps=[];
  for(let i=0;i<N;i++){const a=Math.random()*6.28,sp=2+Math.random()*7.5;
    ps.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,l:1,c:Math.random()>.5?color:"#22d3ee",r:2+Math.random()*3});}
  let t=0;(function loop(){t++;ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l-=.018;ctx.globalAlpha=Math.max(p.l,0);
      ctx.fillStyle=p.c;ctx.shadowBlur=14;ctx.shadowColor=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.3);ctx.fill();});
    if(t<90)requestAnimationFrame(loop);else ctx.clearRect(0,0,cv.width,cv.height);})();
}
function flyCoins(n=6){for(let i=0;i<n;i++){const c=document.createElement("div");c.className="coin";c.textContent="🪙";
  c.style.left=(40+Math.random()*(innerWidth-80))+"px";c.style.top=(innerHeight*0.55)+"px";
  c.style.animationDelay=(i*0.08)+"s";document.body.appendChild(c);setTimeout(()=>c.remove(),1300);}}
function floatXP(txt){const d=document.createElement("div");d.className="floatxp";d.textContent=txt;
  d.style.left=(innerWidth/2-30)+"px";d.style.top=(innerHeight*0.45)+"px";document.body.appendChild(d);setTimeout(()=>d.remove(),1200);}
function beep(f=440,d=.12,t="square"){try{const a=new(window.AudioContext||window.webkitAudioContext)();
  const o=a.createOscillator(),g=a.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(.08,a.currentTime);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}
const sfx={
  tick:()=>beep(660,.07),
  xp:()=>{beep(523,.08);setTimeout(()=>beep(784,.1),70);},
  levelup:()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.14,"sawtooth"),i*90)),
  rankup:()=>[392,523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,.18,"sawtooth"),i*100)),
  coin:()=>{beep(988,.06);setTimeout(()=>beep(1318,.08),60);},
  alarm:()=>[0,1,2,3].forEach(i=>setTimeout(()=>beep(220,.2,"sawtooth"),i*230)),
  die:()=>{beep(180,.3,"sawtooth");setTimeout(()=>beep(120,.4,"sawtooth"),150);},
};

function Bar({type,val,max,label}){const pct=Math.max(0,Math.min(100,(val/max)*100));
  return <div className={"bar "+type}><i style={{width:pct+"%"}}></i><div className="lbl">{label}</div></div>;}

/* ============ APP ============ */
function App(){
  const [s,setS]=useState(load);
  const [tab,setTab]=useState("char");
  const [fx,setFx]=useState(null);
  const [chest,setChest]=useState(null);
  const [goldAsk,setGoldAsk]=useState(null); // task obj awaiting € input
  const [moodAsk,setMoodAsk]=useState(false);
  const [weeklyOpen,setWeeklyOpen]=useState(false);
  const [focus,setFocus]=useState(null); // {total, left, task} active session
  const [showGate,setShowGate]=useState(false);
  const [cine,setCine]=useState(null);   // cinematic rank-up
  const [redFlash,setRedFlash]=useState(0);
  function flashRed(){ setRedFlash(Date.now()); }

  // ambient 3D background (once)
  useEffect(()=>{ mountAmbient(); },[]);

  // day rollover + wake gate
  useEffect(()=>{
    setS(prev=>{
      let n={...prev};
      if(n.daily.date!==todayKey()){
        const cnt=Object.values(n.daily.done||{}).filter(Boolean).length;
        const missed=TOTAL_TASKS-cnt;
        const perfect=cnt>=TOTAL_TASKS;
        n.history={...n.history,[prev.daily.date]:{count:cnt,mood:moodAvg(prev.moodToday)}};
        n.hp=Math.max(0,n.hp-missed*8);
        if(missed>0) setTimeout(()=>{flashRed(); sfx.alarm();},600);
        n.yesterdayCount=cnt;
        n.streak={current:perfect?(prev.streak.current+1):0,best:Math.max(prev.streak.best,perfect?prev.streak.current+1:prev.streak.best)};
        if(!prev.daily.done.gym) n.sportStreak=0;
        n.daily={date:todayKey(),done:{}}; n.moodToday=[];
        n.quoteIdx=(prev.quoteIdx+1)%QUOTES.length;
      }
      return n;
    });
    const st=load();
    if(st.wakeDone!==todayKey()) setShowGate(true);
  },[]);
  useEffect(()=>save(s),[s]);

  const rank=rankOf(s.monthMoney);
  const rankIdx=RANKS.findIndex(r=>r.r===rank.r);
  const nextRank=RANKS[rankIdx+1];
  const need=xpForLevel(s.level);
  const doneCount=Object.values(s.daily.done||{}).filter(Boolean).length;

  /* core award */
  function award(xp,statKey,statVal){
    setS(prev=>{
      let n={...prev,stats:{...prev.stats}};
      if(statKey&&statKey!=="HP")n.stats[statKey]=(n.stats[statKey]||0)+(statVal||0);
      if(statKey==="HP")n.hp=Math.min(n.maxHp,n.hp+25);
      let xpLeft=prev.xp+xp,lv=prev.level,leveled=false;
      while(xpLeft>=xpForLevel(lv)&&lv<100){xpLeft-=xpForLevel(lv);lv++;leveled=true;}
      n.xp=xpLeft;n.level=lv;n.maxHp=100+(lv-1)*5;
      if(leveled)n._leveled=lv;
      return n;
    });
    floatXP("+"+xp+" XP"); sfx.xp();
  }
  useEffect(()=>{ if(s._leveled){sfx.levelup();particleBurst("#8b5cff");burst3D(0x8b5cff);
    setFx({type:"level",title:"LEVEL "+s._leveled,sub:"POWER RISING"});
    setTimeout(()=>setFx(f=>f&&f.type==="level"?null:f),2400);
    setS(p=>{const n={...p};delete n._leveled;return n;});
  }},[s._leveled]);

  const prevRank=useRef(rank.r);
  useEffect(()=>{ if(prevRank.current!==rank.r){
    const oldIdx=RANKS.findIndex(r=>r.r===prevRank.current);
    if(rankIdx>oldIdx){ sfx.rankup(); setCine(rank);
      setTimeout(()=>burst3D(0xFFD700),900);
      setTimeout(()=>particleBurst("#FFD700"),1100);
      setTimeout(()=>setCine(null),4200); }
    prevRank.current=rank.r;}
  },[rank.r]);

  function unlockTitle(id){setS(prev=>{if(prev.titles[id])return prev;
    const t=TITLES.find(x=>x.id===id);particleBurst("#FFD700");sfx.coin();
    setFx({type:"title",title:"TITLE UNLOCKED",sub:t?t.t:id});
    setTimeout(()=>setFx(f=>f&&f.type==="title"?null:f),2400);
    return{...prev,titles:{...prev.titles,[id]:true}};});}

  useEffect(()=>{
    if(s.sportStreak>=7&&!s.titles.iron)unlockTitle("iron");
    if(Object.values(s.gold).reduce((a,b)=>a+b,0)>=1000&&!s.titles.goldmkr)unlockTitle("goldmkr");
    if(s.monthMoney>=12000&&!s.titles.monarch)unlockTitle("monarch");
    if(Object.values(s.botsActive).every(Boolean)&&!s.titles.ghost)unlockTitle("ghost");
  },[s.sportStreak,s.gold,s.monthMoney,s.botsActive]);

  /* toggle task */
  function toggleTask(q){
    if(q.focus && !s.daily.done[q.id]){ startFocus(q); return; }
    if(q.gold && !s.daily.done[q.id]){ setGoldAsk(q); return; }
    setS(prev=>{
      const done={...prev.daily.done},was=done[q.id];done[q.id]=!was;
      let n={...prev,daily:{...prev.daily,done}};
      if(!was){ sfx.tick();
        if(q.id==="gym")n.sportStreak=(prev.sportStreak||0)+1;
        setTimeout(()=>{award(q.xp,q.stat,q.v); checkPerfect(done);},0);
        setTimeout(()=>setMoodAsk(true),350);
      }else{
        if(q.id==="gym")n.sportStreak=Math.max(0,(prev.sportStreak||0)-1);
        n.xp=Math.max(0,prev.xp-q.xp);
        if(q.stat&&q.stat!=="HP")n.stats={...prev.stats,[q.stat]:Math.max(0,(prev.stats[q.stat]||0)-(q.v||0))};
      }
      return n;
    });
  }
  function completeGoldTask(q,euro){
    const amt=Math.round(parseFloat(euro)||0);
    setS(prev=>{
      const done={...prev.daily.done};done[q.id]=true;
      const gk=q.goldkey||q.id;
      const gold={...prev.gold,[gk]:(prev.gold[gk]||0)+amt};
      const month=prev.monthMoney+amt;
      let n={...prev,daily:{...prev.daily,done},gold,monthMoney:month,
        stats:{...prev.stats,LCK:(prev.stats.LCK||0)+(amt>0?1:0)},
        botsActive:{...prev.botsActive,[gk]:true}};
      const newM=MILESTONES.find(m=>month>=m&&prev.monthMoney<m);
      if(newM){n.lastMilestone=newM;setTimeout(()=>{setChest(newM);sfx.rankup();particleBurst("#FFD700");},250);}
      setTimeout(()=>{award(q.xp,null,0);checkPerfect(done);},0);
      return n;
    });
    if(amt>0){flyCoins(7);burst3D(0xFFD700,true);sfx.coin();} else sfx.tick();
    setGoldAsk(null); setTimeout(()=>setMoodAsk(true),350);
  }
  function checkPerfect(done){
    const all=ALL_TASKS.every(t=>done[t.id]);
    if(all){setTimeout(()=>{award(150,null,0);flyCoins(10);sfx.coin();
      setFx({type:"perfect",title:"PERFECT DAY",sub:"+150 XP BONUS 🔥"});
      setTimeout(()=>setFx(f=>f&&f.type==="perfect"?null:f),2400);},250);}
  }
  function logMood(m){setS(prev=>({...prev,moodToday:[...prev.moodToday,{mood:m,t:Date.now()}]}));setMoodAsk(false);sfx.tick();}

  /* ===== FOREST FOCUS ===== */
  function startFocus(task){ setFocus({total:7200,left:7200,task,alive:true}); setTab("focus"); }
  // timer tick handled in FocusScreen via callback
  function focusDone(){
    setFocus(null);
    setS(prev=>{const done={...prev.daily.done};done.block=true;return{...prev,daily:{...prev.daily,done},forest:prev.forest+1};});
    setTimeout(()=>{award(80,"INT",2);particleBurst("#00FF88");
      setFx({type:"forest",title:"TREE GROWN",sub:"+80 XP • SHADOW FOREST +1 🌲"});
      setTimeout(()=>setFx(f=>f&&f.type==="forest"?null:f),2400);
      checkPerfect({...s.daily.done,block:true});},100);
  }
  function focusFail(){ setFocus(null); sfx.die();
    setFx({type:"dead",title:"TREE DIED",sub:"Du hast den Fokus verlassen 💀"});
    setTimeout(()=>setFx(f=>f&&f.type==="dead"?null:f),2200);
  }

  /* ===== Weekly ===== */
  function submitWeekly(data){
    const xp=300+(parseInt(data.sport)||0)*20+(parseInt(data.amount)>0?200:0)+(Object.values(data.bots).filter(Boolean).length*30);
    setS(prev=>({...prev,weekly:[{date:todayKey(),...data,xp},...prev.weekly].slice(0,12)}));
    setTimeout(()=>award(xp,"INT",2),0);
    const cleared=(parseInt(data.sport)||0)>=4&&parseInt(data.amount)>0;
    particleBurst(cleared?"#00FF88":"#FF3B30");sfx.rankup();
    setFx({type:"weekly",title:cleared?"DUNGEON CLEARED":"DUNGEON FAILED",sub:"+"+xp+" XP"});
    setTimeout(()=>setFx(f=>f&&f.type==="weekly"?null:f),2800);
    setWeeklyOpen(false);
  }

  function completeWake(){ setS(prev=>({...prev,wakeDone:todayKey(),wakeTime:Date.now()}));
    setShowGate(false); sfx.rankup(); particleBurst("#8b5cff"); burst3D(0x00FF88); setTimeout(()=>burst3D(0xFFD700),200);
    setFx({type:"awaken",title:"SYSTEM AWAKENED",sub:QUOTES[s.quoteIdx]});
    setTimeout(()=>setFx(f=>f&&f.type==="awaken"?null:f),3200); setTab("quests");
  }

  const penalty=s.hp<=0&&!s.penaltyAck;

  return(<div>
    <div className="screen" key={tab}>
      {tab==="char"&&<CharScreen s={s} rank={rank} rankIdx={rankIdx} nextRank={nextRank} need={need} doneCount={doneCount}/>}
      {tab==="quests"&&<QuestScreen s={s} toggle={toggleTask} doneCount={doneCount}/>}
      {tab==="focus"&&<FocusScreen focus={focus} setFocus={setFocus} forest={s.forest} onDone={focusDone} onFail={focusFail} start={startFocus} blockDone={s.daily.done.block}/>}
      {tab==="gold"&&<GoldScreen s={s} rank={rank}/>}
      {tab==="dash"&&<DashScreen s={s} rank={rank} nextRank={nextRank} doneCount={doneCount} setS={setS} openWeekly={()=>setWeeklyOpen(true)}/>}
    </div>

    {redFlash>0&&<div className="redflash" key={redFlash} onAnimationEnd={()=>setRedFlash(0)}></div>}
    {cine&&<RankUpCinematic rank={cine}/>}

    <div className="tabs">
      {[["char","🛡️","HUNTER"],["quests","📜","QUESTS"],["focus","🌲","FOCUS"],["gold","💰","GOLD"],["dash","📊","DASH"]].map(([k,ic,l])=>(
        <div key={k} className={"tab "+(tab===k?"active":"")} onClick={()=>{setTab(k);sfx.tick();}}><span className="ic">{ic}</span>{l}</div>))}
    </div>

    {/* WAKE GATE */}
    {showGate&&<WakeGate quote={QUOTES[s.quoteIdx]} onSolve={completeWake}/>}

    {/* FX */}
    {fx&&<div className="overlay" onClick={()=>setFx(null)}><div>
      <div className="big-txt" style={{color:fx.type==="rank"||fx.type==="title"?"#FFD700":fx.type==="dead"?"#FF3B30":"#fff"}}>{fx.title}</div>
      <div className="sub" style={{color:fx.type==="forest"?"#00FF88":fx.type==="dead"?"#ff7a72":"#22d3ee"}}>{fx.sub}</div>
      <div className="muted" style={{marginTop:18,fontSize:12,letterSpacing:2}}>TAP TO CONTINUE</div>
    </div></div>}

    {/* CHEST */}
    {chest&&<div className="modal" onClick={()=>setChest(null)}><div className="sheet" style={{textAlign:"center"}} onClick={e=>e.stopPropagation()}>
      <div className="chest3d"><div className="lid"></div><div className="box"></div><div style={{position:"absolute",bottom:18,left:0,right:0,fontSize:24}}>🪙</div></div>
      <h2 className="glow" style={{color:"#FFD700",margin:"8px 0 2px"}}>LOOT CHEST!</h2>
      <div className="muted">Milestone erreicht</div>
      <div className="font-o glow" style={{fontSize:38,color:"#FFD700"}}>{chest.toLocaleString("de")} €</div>
      <button className="btn gold" style={{width:"100%",marginTop:10}} onClick={()=>{setChest(null);flyCoins(10);sfx.coin();}}>CLAIM 🪙</button>
    </div></div>}

    {/* GOLD ASK */}
    {goldAsk&&<GoldAsk task={goldAsk} close={()=>{ setS(prev=>{const done={...prev.daily.done};done[goldAsk.id]=true;
        setTimeout(()=>{award(goldAsk.xp,null,0);checkPerfect(done);},0);return{...prev,daily:{...prev.daily,done}};}); setGoldAsk(null); }}
      submit={completeGoldTask}/>}

    {/* MOOD */}
    {moodAsk&&<div className="modal" onClick={()=>setMoodAsk(false)}><div className="sheet" onClick={e=>e.stopPropagation()}>
      <h3 className="font-o" style={{marginTop:0,fontSize:16}}>Wie fühlst du dich gerade?</h3>
      <div className="moodrow">{MOODS.map(m=><div key={m.v} className="moodbtn" onClick={()=>logMood(m.v)} title={m.k}>{m.e}</div>)}</div>
      <button className="btn ghost" style={{width:"100%",marginTop:12}} onClick={()=>setMoodAsk(false)}>Überspringen</button>

function ShakeChallenge({onSolve}){
  const [n,setN]=useState(0);const [supported,setSupported]=useState(true);
  useEffect(()=>{
    let last={x:0,y:0,z:0},lt=0;
    function handler(e){const a=e.accelerationIncludingGravity||e.acceleration;if(!a)return;
      const now=Date.now();if(now-lt<100)return;lt=now;
      const dx=Math.abs((a.x||0)-last.x),dy=Math.abs((a.y||0)-last.y),dz=Math.abs((a.z||0)-last.z);
      if(dx+dy+dz>22){setN(v=>{const nv=v+1;if(nv>=30){sfx.rankup();onSolve();}else sfx.tick();return nv;});}
      last={x:a.x||0,y:a.y||0,z:a.z||0};}
    function start(){window.addEventListener("devicemotion",handler);}
    if(typeof DeviceMotionEvent!=="undefined"&&typeof DeviceMotionEvent.requestPermission==="function"){
      // iOS needs permission on tap — handled by button
    } else if(typeof DeviceMotionEvent!=="undefined"){ start(); } else setSupported(false);
    return()=>window.removeEventListener("devicemotion",handler);
  },[]);
  async function iosPerm(){try{const p=await DeviceMotionEvent.requestPermission();if(p!=="granted")setSupported(false);}catch(e){setSupported(false);}}
  return(<div className="card" style={{marginTop:6,textAlign:"center"}}>
    <div className="shaketip">📱</div>
    <div className="font-o glow" style={{fontSize:40,color:"#8b5cff",margin:"6px 0"}}>{n}/30</div>
    <Bar type="xp" val={n} max={30} label={Math.round(n/30*100)+"%"}/>
    {typeof DeviceMotionEvent!=="undefined"&&typeof DeviceMotionEvent.requestPermission==="function"&&
      <button className="btn" style={{width:"100%",marginTop:10}} onClick={iosPerm}>📳 Bewegung aktivieren (iOS)</button>}
    {!supported&&<><p className="muted" style={{fontSize:12,marginTop:8}}>Kein Sensor — tappe 30x:</p>
      <button className="btn ghost" style={{width:"100%"}} onClick={()=>setN(v=>{const nv=v+1;if(nv>=30)onSolve();else sfx.tick();return nv;})}>TAP ({n}/30)</button></>}
  </div>);
}

    document.addEventListener("visibilitychange",vis);
    timer.current=setInterval(()=>{
      setFocus(f=>{if(!f)return f;const left=f.left-1;
        if(left<=0){clearInterval(timer.current);setTimeout(onDone,50);return{...f,left:0};}

    return()=>{clearInterval(timer.current);document.removeEventListener("visibilitychange",vis);};

        <div className="font-o glow" style={{fontSize:30,color:rate>=100?"#00FF88":"#fff"}}>{rate}%</div><div className="muted" style={{fontSize:11}}>{doneCount}/{TOTAL_TASKS} Tasks</div></div>
      <div className="card" style={{textAlign:"center",margin:0}}><div className="muted" style={{fontSize:11}}>STREAK</div>
        <div className="font-o glow" style={{fontSize:30,color:"#FFD700"}}>{s.streak.current}🔥</div><div className="muted" style={{fontSize:11}}>Best: {s.streak.best}</div></div>
    </div>
    <div className="section-title">🗓️ 14-Tage Heatmap</div>
    <div className="card"><div className="heat">
      {days.map((d,i)=>{const lvl=d.count==null?-1:Math.round(d.count/TOTAL_TASKS*4);
        const col=lvl<0?"#15122a":["#1e1b34","#2e2456","#5b34c9","#8b5cff","#00FF88"][lvl];
        return<div key={i} style={{background:col,boxShadow:lvl>=3?"0 0 8px "+col:"none",color:"#fff"}} title={d.k}>{d.today?"•":""}</div>;})}
    </div><div className="muted" style={{fontSize:10,textAlign:"center",marginTop:6}}>weniger ▢▢▢ mehr · grün = Perfect Day</div></div>

    <div className="section-title">🤖 Bot Status</div>
    <div className="card">{GOLD_SRC.map(g=>(<div key={g.id} className="row between" style={{padding:"6px 0"}}>
      <span>{g.ic} {g.k}</span>
      <button className={"pill "+(s.botsActive[g.id]?"":"")} style={{cursor:"pointer",color:s.botsActive[g.id]?"#00FF88":"#ff7a72",borderColor:s.botsActive[g.id]?"#00FF8855":"#FF3B3055"}}
        onClick={()=>setS(p=>({...p,botsActive:{...p.botsActive,[g.id]:!p.botsActive[g.id]}}))}>{s.botsActive[g.id]?"● AKTIV":"○ INAKTIV"}</button>
    </div>))}</div>

    <div className="section-title">🎯 Nächster Milestone</div>
    <div className="card"><div className="row between"><span className="muted">{nextRank?("RANK "+nextRank.r):"MAX RANK"}</span>
      <b className="font-o" style={{color:"#FFD700"}}>{nextRank?("noch "+toNext.toLocaleString("de")+" €"):"👑"}</b></div></div>

    <div className="section-title">😊 Mood — letzte 7 Tage</div>
    <div className="card"><MoodCurve data={moodCurve}/>
      {insight&&<p style={{fontSize:13,marginTop:10,color:"#22d3ee"}}>💡 {insight}</p>}</div>

    <div className="section-title">⏰ Letzter Wake</div>
    <div className="card"><div className="row between"><span className="muted">Aufgewacht via Protocol</span>
      <b>{s.wakeTime?new Date(s.wakeTime).toLocaleTimeString("de",{hour:"2-digit",minute:"2-digit"}):"—"}</b></div></div>

    <div className="section-title">🎖️ Titles</div>
    <div className="card">{TITLES.map(t=><span key={t.id} className={"title-chip "+(s.titles[t.id]?"unlocked":"locked")} title={t.d}>{s.titles[t.id]?"👑 ":"🔒 "}{t.t}</span>)}</div>

    <div className="card" style={{textAlign:"center",borderColor:"#8b5cff55"}}>
      <div style={{fontSize:40}}>👹</div><h3 className="font-o glow" style={{color:"#8b5cff",margin:"2px 0"}}>WEEKLY BOSS</h3>
      <div className="pill" style={{marginBottom:10}}>{isSunday?"🟢 HEUTE VERFÜGBAR":"⏳ Sonntag 18:00"}</div><br/>
      <button className="btn" style={{width:"100%"}} onClick={openWeekly}>⚔️ DUNGEON BETRETEN</button>
    </div>
    {s.weekly.length>0&&<><div className="section-title">Letzte Clears</div>
      {s.weekly.slice(0,4).map((w,i)=><div key={i} className="card" style={{padding:"10px 14px",marginBottom:8}}>
        <div className="row between"><b className="font-o" style={{fontSize:13}}>{w.date}</b><span className="pill" style={{color:"#22d3ee"}}>+{w.xp} XP</span></div>
        <div className="muted" style={{fontSize:12,marginTop:3}}>Sport {w.sport}/7 · {w.amount||0}€ {w.plan?"· "+w.plan:""}</div>
      </div>)}</>}
  </div>);
}
function MoodCurve({data}){
  const w=300,h=70,pts=data.map((d,i)=>{const x=i/(data.length-1)*w;const y=d.v?h-((d.v-1)/4)*h:h/2;return[x,y,d];});
  const path=pts.filter(p=>p[2].v).map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  return(<svg viewBox={"0 0 "+w+" "+(h+22)} style={{width:"100%"}}>
    <path d={path} fill="none" stroke="#22d3ee" strokeWidth="2.5" style={{filter:"drop-shadow(0 0 6px #22d3ee)"}}/>
    {pts.map((p,i)=>p[2].v?<g key={i}><circle cx={p[0]} cy={p[1]} r="4" fill="#8b5cff"/>
      <text x={p[0]} y={h+16} textAnchor="middle" fontSize="13">{MOODS[Math.round(p[2].v)-1].e}</text></g>:
      <text key={i} x={p[0]} y={h+16} textAnchor="middle" fontSize="10" fill="#555">·</text>)}
  </svg>);
}

/* ============ MODALS ============ */
function GoldAsk({task,close,submit}){
  const [amt,setAmt]=useState("");
  return(<div className="modal" onClick={close}><div className="sheet" onClick={e=>e.stopPropagation()}>
    <h3 className="font-o" style={{marginTop:0,fontSize:16,color:"#FFD700"}}>{task.ic} {task.t}</h3>
    <div className="muted" style={{fontSize:12,marginBottom:6}}>Wieviel € hat dieser Bot heute gebracht?</div>
    <input type="number" inputMode="decimal" placeholder="z.B. 120 (oder 0)" value={amt} onChange={e=>setAmt(e.target.value)} autoFocus style={{fontSize:22,textAlign:"center"}}/>
    <div className="row" style={{gap:8,marginTop:12}}>
      <button className="btn ghost" style={{flex:1}} onClick={()=>submit(task,0)}>0 € · nur Task ✓</button>
      <button className="btn gold" style={{flex:2}} onClick={()=>submit(task,amt)}>+ {amt||0} € 🪙</button>
    </div>
  </div></div>);
}
function WeeklyModal({close,submit}){
  const [d,setD]=useState({sport:"3",amount:"",worst:"",bots:{hoop:false,foot:false,brain:false,zd:false},plan:""});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  return(<div className="modal" onClick={close}><div className="sheet" onClick={e=>e.stopPropagation()}>
    <h2 className="font-o glow" style={{fontSize:18,marginTop:0,color:"#8b5cff"}}>👹 WEEKLY DUNGEON — BOSS</h2>
    <div className="muted" style={{fontSize:12,marginBottom:4}}>1. Sport diese Woche? (Tage)</div>
    <input type="range" min="0" max="7" value={d.sport} onChange={e=>set("sport",e.target.value)} style={{padding:0}}/>
    <div className="font-o" style={{textAlign:"center",color:"#fff"}}>{d.sport} / 7</div>
    <div className="muted" style={{fontSize:12,margin:"12px 0 4px"}}>2. Verdienst diese Woche? (€)</div>
    <input type="number" inputMode="decimal" placeholder="€" value={d.amount} onChange={e=>set("amount",e.target.value)}/>
    <div className="muted" style={{fontSize:12,margin:"12px 0 4px"}}>3. Schlechtester Tag?</div>
    <input placeholder="z.B. Mittwoch — kein Fokus" value={d.worst} onChange={e=>set("worst",e.target.value)}/>
    <div className="muted" style={{fontSize:12,margin:"12px 0 4px"}}>4. Welche Bots waren aktiv?</div>
    <div className="grid2">{GOLD_SRC.map(g=><button key={g.id} className={"btn "+(d.bots[g.id]?"ok":"ghost")} style={{padding:"10px 4px"}}
      onClick={()=>set("bots",{...d.bots,[g.id]:!d.bots[g.id]})}>{g.ic} {g.k} {d.bots[g.id]?"✓":""}</button>)}</div>
    <div className="muted" style={{fontSize:12,margin:"12px 0 4px"}}>5. Fokus nächste Woche?</div>
    <textarea rows="2" placeholder="Ziele, was besser wird..." value={d.plan} onChange={e=>set("plan",e.target.value)}></textarea>
    <button className="btn" style={{width:"100%",marginTop:14}} onClick={()=>submit(d)}>⚔️ DUNGEON ABSCHLIESSEN</button>
    <button className="btn ghost" style={{width:"100%",marginTop:8}} onClick={close}>Später</button>
  </div></div>);
}

/* ============ DATA UTILS ============ */
function dayCount(){const start=localStorage.getItem("shadowStart");
  if(!start){localStorage.setItem("shadowStart",todayKey());return 1;}
  return Math.max(1,Math.min(90,Math.floor((new Date(todayKey())-new Date(start))/86400000)+1));}
function dateOffset(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function last7(s){const out=[];for(let i=6;i>=0;i--){const k=dateOffset(i);
  const h=s.history[k];const v=i===0?Object.values(s.daily.done||{}).filter(Boolean).length:(h?h.count:0);
  out.push({l:dayName(k),v});}return out;}
function last14(s){const out=[];for(let i=13;i>=0;i--){const k=dateOffset(i);const today=i===0;
  const h=s.history[k];const count=today?Object.values(s.daily.done||{}).filter(Boolean).length:(h?h.count:null);
  out.push({k,count,today});}return out;}
function last7Mood(s){const out=[];for(let i=6;i>=0;i--){const k=dateOffset(i);
  const v=i===0?moodAvg(s.moodToday):(s.history[k]?s.history[k].mood:0);out.push({l:dayName(k),v:v?Math.round(v):0});}return out;}
function buildInsight(s){
  const m=s.moodToday.length?moodAvg(s.moodToday):0;
  if(s.daily.done.gym&&m>=4)return"An Tagen mit Sport bist du öfter im Flow-State. 💪";
  if(!s.daily.done.cold&&m&&m<=2)return"Ohne Cold Shower sackt deine Energie früh ab.";
  if(s.streak.current>=3)return s.streak.current+" Tage perfekt — der Schatten wächst.";
  return s.moodToday.length?"Tracke weiter — Muster werden nach paar Tagen sichtbar.":"Erledige Tasks & checke deine Stimmung für Insights.";
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
